services:
  server:
    build:
      context: .
      target: server
    container_name: pulseguard-server
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - pulseguard-data:/app/data
    environment:
      - TZ=Asia/Seoul
      - PULSEGUARD_TOKEN=${PULSEGUARD_TOKEN:-dev-token}
    command:
      - "--port"
      - "8080"
      - "--grpc-port"
      - "9090"
      - "--db"
      - "/app/data/pulseguard.db"
      - "--web-dir"
      - "/app/web/dist"
      - "--token"
      - "${PULSEGUARD_TOKEN:-dev-token}"
    restart: unless-stopped

volumes:
  pulseguard-data:
